name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'client/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11.17.0

      - name: Test frontend
        working-directory: client
        run: |
          npm ci
          npm test -- --run

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test backend
        run: dotnet test api.Tests/

  deploy:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC Azure login via Federated Credentials
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ── Azure Login ────────────────────────────────────────────────────────
      # Uses OIDC Federated Credentials — no secrets required for Azure auth.
      # The User Assigned Managed Identity already has Federated Credentials
      # configured for ralfonsoftware/energy-tracker on the main branch.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11.17.0

      - name: Build frontend
        working-directory: client
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Functions app
        run: |
          dotnet publish api/energy-tracker-api.csproj \
            -c Release \
            -r linux-x64 \
            --no-self-contained \
            /p:PublishReadyToRun=true \
            -o ./publish/api

      - name: Run EF Core migrations
        env:
          SqlConnectionString: "Server=tcp:energytracker-sqlsrv.database.windows.net,1433;Database=energytracker-db;Authentication=Active Directory Default;TrustServerCertificate=False;Encrypt=True;"
        run: |
          dotnet tool install --global dotnet-ef --version '10.*'
          dotnet ef database update --project api/energy-tracker-api.csproj

      # ── Deploy Frontend ────────────────────────────────────────────────────
      # REQUIRES STORY 1.2: Add AZURE_STATIC_WEB_APPS_API_TOKEN to GitHub secrets.
      # Get it from: Azure Portal → Static Web Apps → Manage deployment token
      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true

      # ── Deploy Backend ─────────────────────────────────────────────────────
      # REQUIRES STORY 1.2: Add AZURE_FUNCTIONS_APP_NAME to GitHub repository variables.
      - name: Deploy Azure Functions app
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONS_APP_NAME }}
          package: ./publish/api

  deploy_preview:
    needs: test
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # ── Frontend only — linked/BYO Functions backends aren't supported in ──
      # ── SWA PR preview environments, so /api/* is not deployed or usable ───
      # ── here. This is a frontend visual-review tool only.                 ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11.17.0

      - name: Build frontend
        working-directory: client
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Deploy preview to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true

  close_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: close
